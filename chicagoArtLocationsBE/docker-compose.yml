services:
  opensearch-node1:
    image: opensearchproject/opensearch:latest
    container_name: opensearch-node1
    environment:
      - discovery.type=single-node
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node1
      - bootstrap.memory_lock=true # along with the memlock settings below, disables swapping
      - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g # minimum and maximum Java heap size, recommend setting both to 50% of system RAM
      # ML settings
      - plugins.ml_commons.only_run_on_ml_node=false
      - plugins.ml_commons.native_memory_threshold=95
      - plugins.ml_commons.allow_registering_model_via_local_file=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=StrongPassword123! # Sets the demo admin user password when using demo configuration, required for OpenSearch 2.12 and higher
      - plugins.security.disabled=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536 # maximum number of open files for the OpenSearch user, set to at least 65536 on modern systems
        hard: 65536
    volumes:
      - opensearch-data1:/usr/share/opensearch/data
    ports:
      - 9200:9200
      - 9600:9600 # required for Performance Analyzer
    networks:
      - opensearch-net
    dns:
      - 8.8.8.8
      - 8.8.4.4
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3
    container_name: opensearch-dashboards
    ports:
      - 5601:5601
    expose:
      - "5601"
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch-node1:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: true
    networks:
      - opensearch-net
    dns:
      - 8.8.8.8
      - 8.8.4.4

volumes:
  opensearch-data1:
  opensearch-data2:

networks:
  opensearch-net:
